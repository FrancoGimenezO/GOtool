version: "3.8"

services:
  app:
    build: .
    container_name: gotool_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: gotool_db
    restart: always
    environment:
      POSTGRES_USER: gotool
      POSTGRES_PASSWORD: gotool123
      POSTGRES_DB: gotool
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
